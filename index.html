<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Course of Miracle</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/311/311022.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #4CAF50; --accent-color: #9C27B0; --gray-color: #607D8B; --danger-color: #f44336; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; background-color: #f4f4f9; 
            padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; font-size: 0.9rem; 
        }
        .container { width: 100%; max-width: 600px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { text-align: center; color: #222; margin-top: 10px; }
        h3 { font-size: 1rem; border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; margin-bottom: 15px; margin-top: 0; }
        
        #alarm-settings { display: none; }
        .btn-toggle-settings { 
            background-color: var(--gray-color); color: white; width: 100%; padding: 10px; 
            margin-bottom: 15px; font-size: 0.85rem; border-radius: 8px;
        }

        .setting-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; align-items: center; }
        .setting-row label { font-weight: 500; min-width: 60px; }
        .setting-row input, .setting-row select { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }

        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; outline: none; margin-bottom: 10px; }
        textarea { min-height: 100px; line-height: 1.5; resize: none; }
        
        button { font-family: inherit; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-add { background-color: var(--primary-color); color: white; padding: 12px; width: 100%; font-size: 1rem; }
        
        /* 알림 실행 버튼 스타일 */
        .btn-run-alarm { background-color: var(--accent-color); color: white; padding: 10px; width: 100%; margin-top: 10px; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-run-alarm.active { background-color: var(--danger-color); }

        .memo-item { background: #fffbe6; padding: 18px; border-left: 6px solid #ffc107; margin-bottom: 15px; border-radius: 8px; position: relative; }
        .btn-group { position: absolute; top: 12px; right: 12px; display: flex; gap: 5px; }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; color: white; border-radius: 4px; }
        .del-btn { background: var(--danger-color); }
        
        /* 알림 가동 중 뱃지 */
        .running-badge { display: inline-block; background: #e1bee7; color: #7b1fa2; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; margin-bottom: 8px; font-weight: bold; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #permission-banner { display: none; background: #333; color: white; padding: 10px; width: 100%; text-align: center; position: fixed; top: 0; left: 0; z-index: 100; }
    </style>
</head>
<body>

<div id="permission-banner" onclick="requestPermission()">
    📍 아이폰 잠금화면 알림을 위해 여기를 눌러 권한을 허용하세요.
</div>

<div class="container">
    <h2>✨ A Course of Miracle</h2>

    <button class="btn-toggle-settings" id="toggle-btn" onclick="toggleSettings()">
        ⚙️ 알림 주기/시간 설정 열기
    </button>

    <div id="alarm-settings" class="card">
        <h3>🔔 알림 주기 설정</h3>
        <div class="setting-row">
            <label>시작</label>
            <input type="time" id="start-time" value="08:00">
            <label>종료</label>
            <input type="time" id="end-time" value="22:00">
        </div>
        <div class="setting-row">
            <label>간격</label>
            <select id="interval-mins">
                <option value="15">15분 마다</option>
                <option value="30">30분 마다</option>
                <option value="60" selected>1시간 마다</option>
                <option value="120">2시간 마다</option>
            </select>
        </div>
    </div>

    <div class="card">
        <h3>✍️ 오늘의 연습서</h3>
        <input type="text" id="title" placeholder="제목 (예: 제 1과)">
        <textarea id="content" placeholder="기억할 문장을 입력하세요..."></textarea>
        <button class="btn-add" onclick="addMemo()">연습서 등록</button>
        
        <button id="run-alarm-btn" class="btn-run-alarm" onclick="toggleAlarmRunning()">
            <span>🔔 알림 실행하기</span>
        </button>
    </div>

    <div id="memo-list"></div>
</div>

<script>
    let memoData = JSON.parse(localStorage.getItem('memos')) || [];
    let isAlarmRunning = JSON.parse(localStorage.getItem('isAlarmRunning')) || false;
    let lastNotifiedTime = null;

    window.onload = () => {
        if (Notification.permission !== "granted") {
            document.getElementById('permission-banner').style.display = 'block';
        }
        updateAlarmBtnUI();
        renderMemos();
        setInterval(checkAlarmSystem, 30000); 
    };

    function toggleSettings() {
        const settings = document.getElementById('alarm-settings');
        const btn = document.getElementById('toggle-btn');
        if (settings.style.display === 'none' || settings.style.display === '') {
            settings.style.display = 'block';
            btn.innerText = '🔼 설정 닫기';
        } else {
            settings.style.display = 'none';
            btn.innerText = '⚙️ 알림 주기/시간 설정 열기';
        }
    }

    function toggleAlarmRunning() {
        if (memoData.length === 0) {
            alert("먼저 연습서를 등록해주세요.");
            return;
        }
        isAlarmRunning = !isAlarmRunning;
        localStorage.setItem('isAlarmRunning', isAlarmRunning);
        updateAlarmBtnUI();
        
        if(isAlarmRunning) {
            alert("알림 시스템이 가동되었습니다. 지정된 시간에 첫 번째 메모가 발송됩니다.");
        }
    }

    function updateAlarmBtnUI() {
        const btn = document.getElementById('run-alarm-btn');
        if (isAlarmRunning) {
            btn.classList.add('active');
            btn.innerHTML = '<span>📴 알림 중지하기</span>';
        } else {
            btn.classList.remove('active');
            btn.innerHTML = '<span>🔔 알림 실행하기</span>';
        }
        renderMemos(); // 리스트에 뱃지 표시 업데이트
    }

    function addMemo() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        if (!title || !content) return alert("내용을 입력하세요.");

        const newMemo = {
            id: Date.now(),
            title,
            content,
            date: new Date().toLocaleDateString()
        };
        memoData.unshift(newMemo);
        saveAndRender();
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
    }

    function checkAlarmSystem() {
        // 알림 실행 상태일 때만 작동
        if (!isAlarmRunning || memoData.length === 0 || Notification.permission !== "granted") return;

        const now = new Date();
        const curTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        const startTime = document.getElementById('start-time').value;
        const endTime = document.getElementById('end-time').value;
        const interval = parseInt(document.getElementById('interval-mins').value);

        if (curTimeStr < startTime || curTimeStr > endTime) return;

        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        if (currentMinutes % interval === 0 && lastNotifiedTime !== currentMinutes) {
            sendNotification(memoData[0]); 
            lastNotifiedTime = currentMinutes;
        }
    }

    function sendNotification(memo) {
        new Notification(`[기적 연습] ${memo.title}`, {
            body: memo.content,
            icon: "https://cdn-icons-png.flaticon.com/512/311/311022.png"
        });
    }

    function renderMemos() {
        const list = document.getElementById('memo-list');
        list.innerHTML = '';
        memoData.forEach((memo, index) => {
            const memoDiv = document.createElement('div');
            memoDiv.className = 'memo-item';
            
            // 첫 번째 메모이면서 알림이 가동 중일 때 뱃지 추가
            const badge = (index === 0 && isAlarmRunning) ? '<span class="running-badge">📡 알림 가동 중</span><br>' : '';
            
            memoDiv.innerHTML = `
                <div class="btn-group">
                    <button class="btn-sm del-btn" onclick="deleteMemo(${memo.id})">삭제</button>
                </div>
                ${badge}
                <h4>${memo.title}</h4>
                <p style="white-space:pre-wrap;">${memo.content}</p>
                <small>${memo.date}</small>
            `;
            list.appendChild(memoDiv);
        });
    }

    function saveAndRender() {
        localStorage.setItem('memos', JSON.stringify(memoData));
        renderMemos();
    }

    function deleteMemo(id) {
        if(confirm("삭제할까요?")) {
            memoData = memoData.filter(m => m.id !== id);
            if(memoData.length === 0) {
                isAlarmRunning = false;
                localStorage.setItem('isAlarmRunning', false);
                updateAlarmBtnUI();
            }
            saveAndRender();
        }
    }

    function requestPermission() {
        Notification.requestPermission().then(p => {
            if (p === "granted") {
                document.getElementById('permission-banner').style.display = 'none';
                new Notification("알림 승인됨", { body: "이제 지정된 간격으로 알림이 전송됩니다." });
            }
        });
    }
</script>
</body>
</html>
