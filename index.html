<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>와이드 스마트 메모장 (저장기능 포함)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f4f4f9; 
            padding: 20px; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-size: 0.9rem; 
        }
        
        .container { width: 100%; max-width: 800px; box-sizing: border-box; }
        
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }
        
        h2 { text-align: center; color: #222; margin-bottom: 20px; font-weight: 700; font-size: 1.5rem; }
        h3 { margin-top: 0; color: #444; border-bottom: 2px solid #4CAF50; padding-bottom: 8px; font-size: 1rem; font-weight: 500; margin-bottom: 15px; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-row input[type="text"] { flex: 6; } 
        .input-row input[type="date"] { flex: 2; min-width: 140px; }

        input, textarea { 
            font-family: 'Noto Sans KR', sans-serif;
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; outline: none; transition: border 0.3s;
        }
        input:focus, textarea:focus { border-color: #4CAF50; }
        textarea { resize: none; overflow-y: hidden; min-height: 100px; margin-bottom: 10px; line-height: 1.5; }

        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        button { 
            font-family: 'Noto Sans KR', sans-serif;
            padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 0.9rem; transition: 0.3s;
        }
        .btn-add { background-color: #4CAF50; color: white; width: 100%; }
        .btn-toggle-filter { background-color: #607D8B; color: white; margin-bottom: 15px; padding: 8px 20px; font-size: 0.85rem; }
        
        #filter-area { display: none; background-color: #eef2f3; border: 1px dashed #90a4ae; }

        .memo-item { 
            background: #fffbe6; 
            padding: 20px; 
            border-left: 6px solid #ffc107; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            position: relative; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
        }
        .memo-actions { position: absolute; top: 15px; right: 15px; display: flex; gap: 5px; }
        .edit-btn { background: #2196F3; color: white; font-size: 0.75rem; padding: 4px 8px; }
        .del-btn { background: #f44336; color: white; font-size: 0.75rem; padding: 4px 8px; }

        h4 { margin: 0 0 5px 0; color: #111; font-weight: 700; font-size: 1.1rem; }
        small { color: #888; font-size: 0.85rem; }
        p { margin-top: 12px; font-weight: 400; color: #333; font-size: 0.95rem; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 와이드 스마트 메모장</h2>

    <div style="text-align: center;">
        <button class="btn-toggle-filter" id="toggle-btn" onclick="toggleFilter()">
            🔍 메모 검색/필터 열기
        </button>
    </div>

    <div id="filter-area" class="card">
        <h3>🔍 메모 찾기</h3>
        <input type="text" id="search-title" placeholder="검색할 제목..." onkeyup="filterMemos()">
        <div class="row" style="margin-top:10px;">
            <input type="date" id="start-date" onchange="filterMemos()">
            <input type="date" id="end-date" onchange="filterMemos()">
        </div>
        <button style="background:#78909c; color:white; width:100%; margin-top:10px;" onclick="resetFilter()">필터 초기화 및 닫기</button>
    </div>

    <div class="card">
        <h3>새 메모 작성</h3>
        <div class="input-row">
            <input type="text" id="title" placeholder="제목">
            <input type="date" id="date">
        </div>
        <textarea id="content" placeholder="내용을 입력하세요..." oninput="autoResize(this)"></textarea>
        <button class="btn-add" onclick="addMemo()">메모 추가하기</button>
    </div>

    <div id="memo-list"></div>
</div>

<script>
    // 페이지 로드 시 실행
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('date').value = new Date().toISOString().substring(0, 10);
        loadMemos();
    });

    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    function toggleFilter() {
        const filterArea = document.getElementById('filter-area');
        const toggleBtn = document.getElementById('toggle-btn');
        const isHidden = window.getComputedStyle(filterArea).display === 'none';
        
        filterArea.style.display = isHidden ? 'block' : 'none';
        toggleBtn.innerText = isHidden ? '🔼 필터 메뉴 닫기' : '🔍 메모 검색/필터 열기';
    }

    // 메모 추가 및 저장
    function addMemo() {
        const title = document.getElementById('title').value;
        const date = document.getElementById('date').value;
        const content = document.getElementById('content').value;

        if (!title || !content) {
            alert("제목과 내용을 입력해주세요!"); return;
        }

        const newMemo = { id: Date.now(), title, date, content };
        const memos = getMemosFromStorage();
        memos.unshift(newMemo); // 최신글이 위로
        saveMemosToStorage(memos);

        renderMemos(memos);
        
        // 입력창 초기화
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        document.getElementById('content').style.height = 'auto';
    }

    // 로컬 저장소에서 데이터 가져오기
    function getMemosFromStorage() {
        const data = localStorage.getItem('smart-memos');
        return data ? JSON.parse(data) : [];
    }

    // 로컬 저장소에 데이터 저장
    function saveMemosToStorage(memos) {
        localStorage.setItem('smart-memos', JSON.stringify(memos));
    }

    // 화면에 메모 리스트 렌더링
    function renderMemos(memos) {
        const list = document.getElementById('memo-list');
        list.innerHTML = '';

        memos.forEach(memo => {
            const memoDiv = document.createElement('div');
            memoDiv.className = 'memo-item';
            memoDiv.setAttribute('data-id', memo.id);
            memoDiv.innerHTML = `
                <div class="memo-actions">
                    <button class="edit-btn" onclick="editMemo(${memo.id})">수정</button>
                    <button class="del-btn" onclick="deleteMemo(${memo.id})">삭제</button>
                </div>
                <h4>${memo.title}</h4>
                <small>📅 ${memo.date}</small>
                <p style="white-space:pre-wrap;">${memo.content}</p>
            `;
            list.appendChild(memoDiv);
        });
    }

    function loadMemos() {
        renderMemos(getMemosFromStorage());
    }

    function deleteMemo(id) {
        if(confirm("정말 삭제하시겠습니까?")) {
            const memos = getMemosFromStorage().filter(m => m.id !== id);
            saveMemosToStorage(memos);
            renderMemos(memos);
        }
    }

    function editMemo(id) {
        const memos = getMemosFromStorage();
        const memo = memos.find(m => m.id === id);
        
        document.getElementById('title').value = memo.title;
        document.getElementById('date').value = memo.date;
        document.getElementById('content').value = memo.content;
        
        // 수정할 데이터를 리스트에서 제거 후 다시 저장
        const updatedMemos = memos.filter(m => m.id !== id);
        saveMemosToStorage(updatedMemos);
        renderMemos(updatedMemos);
        
        autoResize(document.getElementById('content'));
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterMemos() {
        const searchTitle = document.getElementById('search-title').value.toLowerCase();
        const startDate = document.getElementById('start-date').value;
        const endDate = document.getElementById('end-date').value;
        
        const memos = getMemosFromStorage();
        const filtered = memos.filter(memo => {
            const matchesTitle = memo.title.toLowerCase().includes(searchTitle);
            const matchesDate = (!startDate || memo.date >= startDate) && 
                                (!endDate || memo.date <= endDate);
            return matchesTitle && matchesDate;
        });
        
        renderMemos(filtered);
    }

    function resetFilter() {
        document.getElementById('search-title').value = '';
        document.getElementById('start-date').value = '';
        document.getElementById('end-date').value = '';
        loadMemos();
        toggleFilter();
    }
