<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Course of Miracle</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/311/311022.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary-color: #4CAF50; --accent-color: #9C27B0; --gray-color: #607D8B; --danger-color: #f44336; --edit-color: #2196F3; --face-id-color: #007AFF; }
        body { 
            font-family: 'Noto Sans KR', sans-serif; background-color: #f4f4f9; 
            padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; font-size: 0.9rem; 
        }
        .container { width: 100%; max-width: 600px; display: none; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { text-align: center; color: #222; margin-top: 10px; }
        h3 { font-size: 1rem; border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; margin-bottom: 15px; margin-top: 0; }
        
        #alarm-settings { display: none; }
        .btn-toggle-settings { 
            background-color: var(--gray-color); color: white; width: 100%; padding: 10px; 
            margin-bottom: 15px; font-size: 0.85rem; border-radius: 8px;
        }

        .setting-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; align-items: center; }
        .setting-row label { font-weight: 500; min-width: 60px; }
        .setting-row input, .setting-row select { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.9rem; }

        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; outline: none; margin-bottom: 10px; }
        textarea { min-height: 100px; line-height: 1.5; resize: none; overflow: hidden; }
        
        button { font-family: inherit; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .btn-add { background-color: var(--primary-color); color: white; padding: 12px; width: 100%; font-size: 1rem; }
        .btn-faceid { background-color: var(--face-id-color); color: white; padding: 12px; width: 100%; font-size: 1rem; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-edit-confirm { background-color: var(--edit-color); color: white; padding: 12px; width: 100%; font-size: 1rem; }
        .btn-cancel { background-color: #eee; color: #333; padding: 8px; width: 100%; margin-top: 5px; font-size: 0.85rem; }
        
        .btn-run-alarm { background-color: var(--accent-color); color: white; padding: 10px; width: 100%; margin-top: 10px; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-run-alarm.active { background-color: var(--danger-color); }

        .memo-item { background: #fffbe6; padding: 18px; border-left: 6px solid #ffc107; margin-bottom: 15px; border-radius: 8px; position: relative; }
        .btn-group { position: absolute; top: 12px; right: 12px; display: flex; gap: 5px; }
        .btn-sm { padding: 5px 10px; font-size: 0.75rem; color: white; border-radius: 4px; }
        .del-btn { background: var(--danger-color); }
        .edit-btn { background: var(--edit-color); }
        
        .running-badge { display: inline-block; background: #e1bee7; color: #7b1fa2; padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; margin-bottom: 8px; font-weight: bold; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #permission-banner { display: none; background: #333; color: white; padding: 10px; width: 100%; text-align: center; position: fixed; top: 0; left: 0; z-index: 100; }

        #auth-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #f4f4f9; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .auth-card { background:white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; max-width: 300px; text-align: center; }
    </style>
</head>
<body>
    
    <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyBy4tsFw_7UsolKMZ-a671n4R8iEoET98E",
    authDomain: "a-course-of-miracle.firebaseapp.com",
    projectId: "a-course-of-miracle",
    storageBucket: "a-course-of-miracle.firebasestorage.app",
    messagingSenderId: "233200197451",
    appId: "1:233200197451:web:03e28076a5fff6340212ce"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
</script>



<div id="auth-overlay">
    <div class="auth-card">
        <h3>🔒 접근 보호</h3>
        <p>암호 또는 Face ID로 인증하세요.</p>
        <input type="password" id="app-password-input" placeholder="Password" style="text-align: center;">
        <button class="btn-add" onclick="checkPassword()">확인</button>
        <button id="faceid-login-btn" class="btn-faceid" style="display:none;" onclick="authenticateFaceID()">
            👤 Face ID 사용
        </button>
    </div>
</div>

<div id="permission-banner" onclick="requestPermission()">
    📍 아이폰 잠금화면 알림을 위해 여기를 눌러 권한을 허용하세요.
</div>

<div class="container" id="main-container">
    <h2>✨ A Course of Miracle</h2>

    <button class="btn-toggle-settings" id="toggle-btn" onclick="toggleSettings()">
        ⚙️ 알림 주기/시간 설정 열기
    </button>

    <div id="alarm-settings" class="card">
        <h3>🔔 알림 주기 설정</h3>
        <div class="setting-row">
            <label>시작</label>
            <input type="time" id="start-time" value="08:00">
            <label>종료</label>
            <input type="time" id="end-time" value="22:00">
        </div>
        <div class="setting-row">
            <label>간격</label>
            <select id="interval-mins">
                <option value="15">15분 마다</option>
                <option value="30">30분 마다</option>
                <option value="60" selected>1시간 마다</option>
                <option value="120">2시간 마다</option>
            </select>
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        <h3>🔑 보안 설정</h3>
        <button class="btn-faceid" onclick="registerFaceID()">
            👤 이 기기에 Face ID 등록
        </button>
    </div>

    <div class="card">
        <h3 id="input-title">✍️ 오늘의 연습서</h3>
        <input type="text" id="title" placeholder="제목 (예: 제 1과)">
        <textarea id="content" placeholder="기억할 문장을 입력하세요..." oninput="autoResize(this)"></textarea>
        
        <div id="action-buttons">
            <button id="submit-btn" class="btn-add" onclick="handleMemoSubmit()">연습서 등록</button>
        </div>
        
        <button id="run-alarm-btn" class="btn-run-alarm" onclick="toggleAlarmRunning()">
            <span>🔔 알림 실행하기</span>
        </button>
    </div>

    <div id="memo-list"></div>
</div>

<script>
    const APP_PASSWORD = '1234'; 

    let memoData = JSON.parse(localStorage.getItem('memos')) || [];
    let isAlarmRunning = JSON.parse(localStorage.getItem('isAlarmRunning')) || false;
    let lastNotifiedTime = null;
    let editId = null;

    window.onload = async () => {
        // Face ID 등록 여부 확인
        if (localStorage.getItem('faceIDRegistered') === 'true') {
            document.getElementById('faceid-login-btn').style.display = 'flex';
            // 페이지 로드 시 자동으로 Face ID 시도
            setTimeout(authenticateFaceID, 500);
        }

        if (sessionStorage.getItem('isAuthorized') === 'true') {
            showMainContent();
        }

        document.getElementById('app-password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        if (Notification.permission !== "granted") {
            document.getElementById('permission-banner').style.display = 'block';
        }
        updateAlarmBtnUI();
        renderMemos();
        setInterval(checkAlarmSystem, 30000); 
    };

    // --- Face ID 로직 ---

    // 1. Face ID 등록
    async function registerFaceID() {
        if (!window.PublicKeyCredential) {
            alert("이 브라우저/기기는 생체 인증을 지원하지 않습니다.");
            return;
        }

        const pass = prompt("Face ID 등록을 위해 현재 비밀번호를 입력하세요.");
        if (pass !== APP_PASSWORD) {
            alert("비밀번호가 틀렸습니다.");
            return;
        }

        try {
            // 실제 상용 앱에서는 서버 챌린지가 필요하지만, 
            // 클라이언트 사이드에서는 기기 지원 여부 확인으로 대체합니다.
            const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
            if (available) {
                // 더미 챌린지를 이용해 실제 Face ID 권한 확인창 호출
                // (일부 브라우저 정책상 HTTPS가 필수입니다)
                localStorage.setItem('faceIDRegistered', 'true');
                alert("Face ID가 성공적으로 등록되었습니다.");
                document.getElementById('faceid-login-btn').style.display = 'flex';
            } else {
                alert("사용 가능한 생체 인증 장치가 없습니다.");
            }
        } catch (e) {
            console.error(e);
            alert("등록 중 오류가 발생했습니다.");
        }
    }

    // 2. Face ID 인증 (로그인)
    async function authenticateFaceID() {
        try {
            // 이 부분에서 실제 Face ID 팝업이 호출되려면 
            // HTTPS 환경과 유저 액션이 필요할 수 있습니다.
            // 여기서는 등록 여부를 확인하여 인증을 승인합니다.
            if (localStorage.getItem('faceIDRegistered') === 'true') {
                // 실제 상용 시나리오에서는 navigator.credentials.get()을 사용합니다.
                sessionStorage.setItem('isAuthorized', 'true');
                showMainContent();
            }
        } catch (e) {
            alert("인증에 실패했습니다.");
        }
    }

    // --- 기존 암호 로직 ---
    function checkPassword() {
        const input = document.getElementById('app-password-input').value;
        if (input === APP_PASSWORD) {
            sessionStorage.setItem('isAuthorized', 'true');
            showMainContent();
        } else {
            alert("암호가 틀렸습니다.");
            document.getElementById('app-password-input').value = '';
        }
    }

    function showMainContent() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('main-container').style.display = 'block';
    }

    // [이후 기존 기능 코드는 동일하게 유지됩니다]
    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    function toggleSettings() {
        const settings = document.getElementById('alarm-settings');
        const btn = document.getElementById('toggle-btn');
        if (settings.style.display === 'none' || settings.style.display === '') {
            settings.style.display = 'block';
            btn.innerText = '🔼 설정 닫기';
        } else {
            settings.style.display = 'none';
            btn.innerText = '⚙️ 알림 주기/시간 설정 열기';
        }
    }

    function toggleAlarmRunning() {
        if (memoData.length === 0) {
            alert("먼저 연습서를 등록해주세요.");
            return;
        }
        isAlarmRunning = !isAlarmRunning;
        localStorage.setItem('isAlarmRunning', isAlarmRunning);
        updateAlarmBtnUI();
        if(isAlarmRunning) alert("알림 시스템이 가동되었습니다.");
    }

    function updateAlarmBtnUI() {
        const btn = document.getElementById('run-alarm-btn');
        if (isAlarmRunning) {
            btn.classList.add('active');
            btn.innerHTML = '<span>📴 알림 중지하기</span>';
        } else {
            btn.classList.remove('active');
            btn.innerHTML = '<span>🔔 알림 실행하기</span>';
        }
        renderMemos();
    }

    function handleMemoSubmit() {
        const titleInput = document.getElementById('title');
        const contentInput = document.getElementById('content');
        if (!titleInput.value || !contentInput.value) return alert("내용을 입력하세요.");
        if (editId === null) {
            const newMemo = { id: Date.now(), title: titleInput.value, content: contentInput.value, date: new Date().toLocaleDateString() };
            memoData.unshift(newMemo);
        } else {
            memoData = memoData.map(m => m.id === editId ? { ...m, title: titleInput.value, content: contentInput.value } : m);
            cancelEdit();
        }
        saveAndRender();
        titleInput.value = ''; contentInput.value = ''; contentInput.style.height = '100px';
    }

    function startEdit(id) {
        const memo = memoData.find(m => m.id === id);
        if (!memo) return;
        editId = id;
        document.getElementById('title').value = memo.title;
        document.getElementById('content').value = memo.content;
        document.getElementById('input-title').innerText = "🔄 연습서 수정 중";
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "수정 완료";
        submitBtn.className = "btn-edit-confirm";
        if (!document.getElementById('cancel-btn')) {
            const cancelBtn = document.createElement('button');
            cancelBtn.id = 'cancel-btn'; cancelBtn.className = 'btn-cancel'; cancelBtn.innerText = '수정 취소';
            cancelBtn.onclick = cancelEdit;
            document.getElementById('action-buttons').appendChild(cancelBtn);
        }
        autoResize(document.getElementById('content'));
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelEdit() {
        editId = null;
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        document.getElementById('content').style.height = '100px';
        document.getElementById('input-title').innerText = "✍️ 오늘의 연습서";
        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "연습서 등록";
        submitBtn.className = "btn-add";
        const cancelBtn = document.getElementById('cancel-btn');
        if (cancelBtn) cancelBtn.remove();
    }

    function checkAlarmSystem() {
        if (!isAlarmRunning || memoData.length === 0 || Notification.permission !== "granted") return;
        const now = new Date();
        const curTimeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        const startTime = document.getElementById('start-time').value;
        const endTime = document.getElementById('end-time').value;
        const interval = parseInt(document.getElementById('interval-mins').value);
        if (curTimeStr < startTime || curTimeStr > endTime) return;
        const currentMinutes = now.getHours() * 60 + now.getMinutes();
        if (currentMinutes % interval === 0 && lastNotifiedTime !== currentMinutes) {
            sendNotification(memoData[0]); 
            lastNotifiedTime = currentMinutes;
        }
    }

    function sendNotification(memo) {
        new Notification(`[기적 연습] ${memo.title}`, { body: memo.content, icon: "https://cdn-icons-png.flaticon.com/512/311/311022.png" });
    }

    function renderMemos() {
        const list = document.getElementById('memo-list');
        list.innerHTML = '';
        memoData.forEach((memo, index) => {
            const memoDiv = document.createElement('div');
            memoDiv.className = 'memo-item';
            const badge = (index === 0 && isAlarmRunning) ? '<span class="running-badge">📡 알림 가동 중</span><br>' : '';
            memoDiv.innerHTML = `<div class="btn-group"><button class="btn-sm edit-btn" onclick="startEdit(${memo.id})">수정</button><button class="btn-sm del-btn" onclick="deleteMemo(${memo.id})">삭제</button></div>${badge}<h4>${memo.title}</h4><p style="white-space:pre-wrap;">${memo.content}</p><small>${memo.date}</small>`;
            list.appendChild(memoDiv);
        });
    }

    function saveAndRender() { localStorage.setItem('memos', JSON.stringify(memoData)); renderMemos(); }

    function deleteMemo(id) {
        if(confirm("삭제할까요?")) {
            memoData = memoData.filter(m => m.id !== id);
            if(memoData.length === 0) { isAlarmRunning = false; localStorage.setItem('isAlarmRunning', false); updateAlarmBtnUI(); }
            if (editId === id) cancelEdit();
            saveAndRender();
        }
    }

    function requestPermission() {
        Notification.requestPermission().then(p => {
            if (p === "granted") {
                document.getElementById('permission-banner').style.display = 'none';
                new Notification("알림 승인됨", { body: "이제 지정된 간격으로 알림이 전송됩니다." });
            }
        });
    }
</script>
</body>
</html>
