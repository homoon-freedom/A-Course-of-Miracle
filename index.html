<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>와이드 메모장 (저장 기능 추가)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #f4f4f9; 
            padding: 20px; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-size: 0.9rem; 
        }
        
        .container { width: 100%; box-sizing: border-box; max-width: 800px; }
        
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }
        
        h2 { text-align: center; color: #222; margin-bottom: 20px; font-weight: 700; font-size: 1.5rem; }
        h3 { margin-top: 0; color: #444; border-bottom: 2px solid #4CAF50; padding-bottom: 8px; font-size: 1rem; font-weight: 500; margin-bottom: 15px; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-row input[type="text"] { flex: 6; margin-bottom: 0; } 
        .input-row input[type="date"] { flex: 1; min-width: 140px; margin-bottom: 0; }

        input, textarea { 
            font-family: 'Noto Sans KR', sans-serif;
            width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; outline: none; transition: border 0.3s;
        }
        input:focus, textarea:focus { border-color: #4CAF50; }
        
        textarea { resize: none; overflow-y: hidden; min-height: 100px; margin-bottom: 10px; line-height: 1.5; }

        .row { display: flex; gap: 10px; margin-bottom: 10px; }
        
        button { 
            font-family: 'Noto Sans KR', sans-serif;
            width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 0.9rem; transition: 0.3s;
        }
        .btn-add { background-color: #4CAF50; color: white; margin-top: 5px; }
        
        .btn-toggle-filter { background-color: #607D8B; color: white; margin-bottom: 15px; width: auto; padding: 8px 20px; font-size: 0.85rem; }
        
        #filter-area { 
            display: none; 
            background-color: #eef2f3; 
            border: 1px dashed #90a4ae;
        }

        .memo-item { 
            background: #fffbe6; 
            padding: 20px; 
            border-left: 6px solid #ffc107; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            position: relative; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); 
        }
        .btn-group { position: absolute; top: 15px; right: 15px; display: flex; gap: 5px; }
        .edit-btn { width: auto; padding: 4px 10px; background: #2196F3; color: white; font-size: 0.8rem; border-radius: 4px; }
        .del-btn { width: auto; padding: 4px 10px; background: #f44336; color: white; font-size: 0.8rem; border-radius: 4px; }
        
        h4 { margin: 0 0 5px 0; color: #111; font-weight: 700; font-size: 1.1rem; }
        small { color: #888; font-size: 0.85rem; }
        p { margin-top: 12px; font-weight: 400; color: #333; font-size: 0.95rem; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h2>A Course of Miracle</h2>

    <div style="text-align: center;">
        <button class="btn-toggle-filter" id="toggle-btn" onclick="toggleFilter()">
            🔍 메모 검색/필터 열기
        </button>
    </div>

    <div id="filter-area" class="card">
        <h3>🔍 메모 찾기</h3>
        <input type="text" id="search-title" placeholder="검색할 제목..." onkeyup="renderMemos()">
        <div class="row">
            <input type="date" id="start-date" onchange="renderMemos()">
            <input type="date" id="end-date" onchange="renderMemos()">
        </div>
        <button style="background:#f44336; color:white;" onclick="resetFilter()">필터 초기화 및 닫기</button>
    </div>

    <div class="card">
        <h3>오늘의 연습서</h3>
        <div class="input-row">
            <input type="text" id="title" placeholder="제목">
            <input type="date" id="date">
        </div>
        <textarea id="content" placeholder="내용을 입력하세요..." oninput="autoResize(this)"></textarea>
        <button class="btn-add" onclick="addMemo()">메모 추가하기</button>
    </div>

    <div id="memo-list"></div>
</div>

<script>
    // 1. 초기 데이터 로드
    let memoData = JSON.parse(localStorage.getItem('memos')) || [];
    document.getElementById('date').value = new Date().toISOString().substring(0, 10);

    // 초기 실행 시 화면 그리기
    window.onload = () => {
        renderMemos();
    };

    function autoResize(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
    }

    function toggleFilter() {
        const filterArea = document.getElementById('filter-area');
        const toggleBtn = document.getElementById('toggle-btn');
        const isHidden = window.getComputedStyle(filterArea).display === 'none';
        
        filterArea.style.display = isHidden ? 'block' : 'none';
        toggleBtn.innerText = isHidden ? '🔼 필터 메뉴 닫기' : '🔍 메모 검색/필터 열기';
    }

    // 2. 메모 추가 기능 (데이터 중심)
    function addMemo() {
        const titleInput = document.getElementById('title');
        const dateInput = document.getElementById('date');
        const contentInput = document.getElementById('content');

        if (!titleInput.value || !contentInput.value) {
            alert("제목과 내용을 입력해주세요!"); return;
        }

        const newMemo = {
            id: Date.now(), // 고유 ID 부여
            title: titleInput.value,
            date: dateInput.value,
            content: contentInput.value
        };

        memoData.unshift(newMemo); // 배열 앞에 추가
        saveAndRender();

        // 입력창 초기화
        titleInput.value = '';
        contentInput.value = '';
        autoResize(contentInput);
    }

    // 3. 화면 그리기 기능 (필터링 포함)
    function renderMemos() {
        const list = document.getElementById('memo-list');
        const searchTitle = document.getElementById('search-title').value.toLowerCase();
        const startDate = document.getElementById('start-date').value;
        const endDate = document.getElementById('end-date').value;

        list.innerHTML = ''; // 리스트 초기화

        const filtered = memoData.filter(memo => {
            const matchesTitle = memo.title.toLowerCase().includes(searchTitle);
            const matchesStart = !startDate || memo.date >= startDate;
            const matchesEnd = !endDate || memo.date <= endDate;
            return matchesTitle && matchesStart && matchesEnd;
        });

        filtered.forEach(memo => {
            const memoDiv = document.createElement('div');
            memoDiv.className = 'memo-item';
            memoDiv.innerHTML = `
                <div class="btn-group">
                    <button class="edit-btn" onclick="editMemo(${memo.id})">수정</button>
                    <button class="del-btn" onclick="deleteMemo(${memo.id})">삭제</button>
                </div>
                <h4>${memo.title}</h4>
                <small>📅 ${memo.date}</small>
                <p style="white-space:pre-wrap;">${memo.content}</p>
            `;
            list.appendChild(memoDiv);
        });
    }

    // 4. 저장 및 동기화
    function saveAndRender() {
        localStorage.setItem('memos', JSON.stringify(memoData));
        renderMemos();
    }

    // 5. 삭제 기능
    function deleteMemo(id) {
        if(confirm("이 메모를 삭제하시겠습니까?")) {
            memoData = memoData.filter(m => m.id !== id);
            saveAndRender();
        }
    }

    // 6. 수정 기능
    function editMemo(id) {
        const target = memoData.find(m => m.id === id);
        if(!target) return;

        document.getElementById('title').value = target.title;
        document.getElementById('date').value = target.date;
        const contentArea = document.getElementById('content');
        contentArea.value = target.content;
        
        autoResize(contentArea);
        
        // 기존 데이터 삭제 후 상단으로 이동 (수정 모드 진입 효과)
        memoData = memoData.filter(m => m.id !== id);
        saveAndRender();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetFilter() {
        document.getElementById('search-title').value = '';
        document.getElementById('start-date').value = '';
        document.getElementById('end-date').value = '';
        renderMemos();
        toggleFilter();
    }
</script>

</body>
</html>
